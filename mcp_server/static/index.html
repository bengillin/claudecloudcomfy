<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comfy Cloud Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
  .fade-in { animation: fadeIn .3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  video, img { max-width: 100%; border-radius: 0.5rem; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen" x-data="app()" x-init="init()">

<!-- Nav -->
<nav x-show="ready" class="sticky top-0 z-50 bg-gray-900/90 backdrop-blur border-b border-gray-800">
  <div class="max-w-5xl mx-auto flex items-center gap-1 p-2">
    <span class="text-lg font-bold mr-4">&#9889; Studio</span>
    <button @click="mode='studio'" :class="mode==='studio' ? 'bg-gray-700' : 'bg-gray-800'" class="px-3 py-1.5 rounded-lg text-sm">Studio</button>
    <button @click="mode='mv'" :class="mode==='mv' ? 'bg-gray-700' : 'bg-gray-800'" class="px-3 py-1.5 rounded-lg text-sm">Music Video</button>
    <div class="flex-1"></div>
    <button @click="loadGallery()" class="text-xs text-gray-400 hover:text-gray-200">Gallery</button>
  </div>
</nav>

<main class="max-w-5xl mx-auto p-3 pb-20">

<!-- ═══════════ SETUP ═══════════ -->
<template x-if="!ready" x-cloak>
<div class="max-w-md mx-auto mt-12 space-y-4 text-center fade-in">
  <div class="text-4xl">&#9889;</div>
  <h1 class="text-xl font-bold">Welcome to Comfy Cloud Studio</h1>
  <template x-if="setupError === 'no_key'">
    <div class="bg-gray-900 rounded-lg p-6 text-left space-y-3 border border-gray-800">
      <p class="text-sm text-gray-300">API key not found. Set it up:</p>
      <ol class="text-sm text-gray-400 space-y-2 list-decimal list-inside">
        <li>Get a key at <a href="https://platform.comfy.org/profile/api-keys" target="_blank" class="text-blue-400 underline">platform.comfy.org</a></li>
        <li>Edit <code class="bg-gray-800 px-1 rounded">.env</code> in the project root</li>
        <li>Set <code class="bg-gray-800 px-1 rounded">COMFY_API_KEY=your_key</code></li>
        <li>Restart the server</li>
      </ol>
    </div>
  </template>
  <template x-if="setupError === 'loading'">
    <p class="text-gray-400 animate-pulse">Loading...</p>
  </template>
</div>
</template>

<!-- ═══════════ STUDIO MODE ═══════════ -->
<template x-if="mode==='studio'" x-cloak>
<div class="space-y-4 fade-in">

  <!-- Preset Picker -->
  <div>
    <h2 class="text-sm font-medium text-gray-400 mb-2">Preset</h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
      <template x-for="(info, name) in presets" :key="name">
        <button @click="selectedPreset=name; promptGuide=info.description"
                :class="selectedPreset===name ? 'ring-2 ring-blue-500 bg-gray-800' : 'bg-gray-900'"
                class="p-3 rounded-lg text-left border border-gray-800 hover:border-gray-600">
          <div class="font-medium text-sm" x-text="name"></div>
          <div class="text-xs text-gray-500 mt-1" x-text="info.capabilities?.join(', ')"></div>
        </button>
      </template>
    </div>
  </div>

  <!-- Prompt -->
  <div>
    <textarea x-model="prompt" rows="3" placeholder="Describe what you want to create..."
              class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
    <p class="text-xs text-gray-600 mt-1" x-text="promptGuide"></p>
  </div>

  <!-- Image Upload (for img2vid/edit presets) -->
  <div x-show="presets[selectedPreset]?.has_image_input">
    <label class="block w-full border-2 border-dashed border-gray-700 rounded-lg p-6 text-center cursor-pointer hover:border-gray-500">
      <input type="file" accept="image/*" @change="handleImageUpload($event)" class="hidden">
      <span x-text="uploadedFile ? uploadedFile.name : 'Drop image here or tap to upload'" class="text-sm text-gray-400"></span>
    </label>
  </div>

  <!-- Aspect Ratio -->
  <div>
    <h2 class="text-sm font-medium text-gray-400 mb-2">Aspect Ratio</h2>
    <div class="flex gap-1.5 flex-wrap">
      <template x-for="ar in aspectRatios" :key="ar.label">
        <button @click="aspectRatio=ar"
                :class="aspectRatio.label===ar.label ? 'ring-2 ring-blue-500 bg-gray-800' : 'bg-gray-900'"
                class="px-3 py-1.5 rounded-lg text-xs border border-gray-800 hover:border-gray-600">
          <span x-text="ar.label"></span>
          <span class="text-gray-600 ml-1" x-text="ar.w+'×'+ar.h"></span>
        </button>
      </template>
    </div>
  </div>

  <!-- Controls -->
  <div class="flex gap-2 items-center">
    <input x-model="seed" type="number" placeholder="Seed (random)" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm w-28">
    <button @click="generate()" :disabled="generating || !selectedPreset"
            :class="generating ? 'bg-gray-700' : 'bg-blue-600 hover:bg-blue-500'"
            class="flex-1 py-2 rounded-lg font-medium text-sm disabled:opacity-50">
      <span x-text="generating ? status || 'Generating...' : 'Generate'"></span>
    </button>
  </div>

  <!-- Result -->
  <div x-show="result" class="fade-in">
    <template x-if="result?.status === 'error'">
      <div class="bg-red-900/40 border border-red-700/40 rounded-lg p-3 text-sm space-y-1">
        <div class="font-medium text-red-200">
          <span x-text="'Error'"></span>
          <span x-show="result?.category" class="text-xs ml-2 uppercase" x-text="result?.category"></span>
        </div>
        <div class="text-gray-300" x-text="result?.error"></div>
        <div x-show="result?.hint" class="text-xs text-gray-400 italic" x-text="'&#128161; ' + result?.hint"></div>
      </div>
    </template>
    <template x-if="result?.file?.endsWith('.mp4')">
      <video :src="'/files/' + result?.file" controls autoplay loop class="w-full rounded-lg"></video>
    </template>
    <template x-if="result?.file && !result?.file?.endsWith('.mp4')">
      <img :src="'/files/' + result?.file" class="w-full rounded-lg">
    </template>
    <div class="flex gap-2 mt-2">
      <button @click="seed = Math.floor(Math.random()*999999); generate()" class="text-xs bg-gray-800 px-3 py-1.5 rounded-lg hover:bg-gray-700">New Seed</button>
      <a :href="'/files/' + result?.file" download class="text-xs bg-gray-800 px-3 py-1.5 rounded-lg hover:bg-gray-700">Download</a>
    </div>
  </div>

  <!-- Gallery -->
  <div x-show="gallery.length > 0">
    <h2 class="text-sm font-medium text-gray-400 mb-2">Recent</h2>
    <div class="grid grid-cols-3 sm:grid-cols-4 gap-2">
      <template x-for="f in gallery" :key="f.path">
        <div @click="viewFile(f)" class="cursor-pointer">
          <template x-if="f.name.endsWith('.mp4')">
            <div class="bg-gray-900 rounded-lg aspect-square flex items-center justify-center text-2xl">&#9654;</div>
          </template>
          <template x-if="!f.name.endsWith('.mp4')">
            <img :src="'/files/' + f.path" loading="lazy" class="rounded-lg aspect-square object-cover">
          </template>
        </div>
      </template>
    </div>
  </div>
</div>
</template>

<!-- ═══════════ MUSIC VIDEO MODE ═══════════ -->
<template x-if="mode==='mv'" x-cloak>
<div class="space-y-4 fade-in">

  <!-- Step Indicator -->
  <div class="flex gap-1 text-xs">
    <template x-for="(label, i) in ['Upload', 'World', 'Scenes', 'Generate', 'Review']" :key="i">
      <button @click="mvStep = i" :class="mvStep === i ? 'bg-blue-600' : i < mvStep ? 'bg-green-800' : 'bg-gray-800'" class="flex-1 py-1.5 rounded text-center" x-text="label"></button>
    </template>
  </div>

  <!-- Step 0: Upload Song -->
  <div x-show="mvStep===0" class="space-y-3">

    <!-- Resume existing project -->
    <div x-show="mvProjects.length > 0" class="bg-gray-900 rounded-lg p-3 border border-gray-800">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-medium text-gray-400">Resume a project</h2>
        <button @click="mvLoadProjects()" class="text-xs text-gray-500 hover:text-gray-300">&#8635;</button>
      </div>
      <div class="space-y-1 max-h-48 overflow-y-auto">
        <template x-for="p in mvProjects" :key="p.name">
          <button @click="mvLoadProject(p.name)" class="w-full text-left p-2 rounded hover:bg-gray-800 flex items-center gap-2">
            <span class="text-sm flex-1" x-text="p.title"></span>
            <span class="text-xs text-gray-500" x-text="p.scene_count + ' scenes'"></span>
            <span class="text-xs" :class="p.has_final ? 'text-green-400' : 'text-gray-600'" x-text="p.has_final ? '&#9679; final' : (p.clip_count + '/' + p.scene_count + ' clips')"></span>
          </button>
        </template>
      </div>
    </div>

    <!-- Or start a new one -->
    <div class="space-y-3 pt-2">
      <div class="text-xs text-gray-500 uppercase tracking-wide" x-show="mvProjects.length > 0">Or start new</div>
      <input x-model="mvProject" placeholder="Project name" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm">
      <input x-model="mvTitle" placeholder="Song title" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm">
      <label class="block w-full border-2 border-dashed border-gray-700 rounded-lg p-8 text-center cursor-pointer hover:border-gray-500">
        <input type="file" accept="audio/*" @change="mvAudioFile = $event.target.files[0]" class="hidden">
        <span x-text="mvAudioFile ? mvAudioFile.name : 'Drop song here'" class="text-gray-400"></span>
      </label>
      <div>
        <h2 class="text-sm font-medium text-gray-400 mb-2">Aspect Ratio</h2>
        <div class="flex gap-1.5 flex-wrap">
          <template x-for="ar in aspectRatios" :key="ar.label">
            <button @click="mvAspectRatio=ar"
                    :class="mvAspectRatio.label===ar.label ? 'ring-2 ring-blue-500 bg-gray-800' : 'bg-gray-900'"
                    class="px-3 py-1.5 rounded-lg text-xs border border-gray-800 hover:border-gray-600">
              <span x-text="ar.label"></span>
            </button>
          </template>
        </div>
      </div>
      <button @click="mvPlan()" :disabled="!mvProject || !mvAudioFile || mvLoading"
              class="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-medium text-sm disabled:opacity-50">
        <span x-text="mvLoading ? 'Transcribing...' : 'Plan Video'"></span>
      </button>
    </div>

    <!-- Plan result banner -->
    <div x-show="mvPlanResult" class="bg-gray-900 rounded-lg p-3 border border-gray-800 text-xs space-y-2">
      <div class="flex items-center justify-between">
        <span class="text-gray-400">
          <span x-text="'Planned ' + mvPlanResult?.scene_count + ' scenes'"></span>
          <span class="text-gray-600" x-text="' · ' + (mvPlanResult?.duration || 0).toFixed(1) + 's'"></span>
          <template x-if="mvPlanResult?.beat_info?.tempo_bpm">
            <span class="text-gray-600" x-text="' · ' + mvPlanResult.beat_info.tempo_bpm + ' BPM · beat-split into ' + mvPlanResult.beat_info.scene_count_after + ' scenes'"></span>
          </template>
        </span>
        <button @click="mvDismissPlanResult()" class="text-gray-600 hover:text-gray-300">&times;</button>
      </div>
      <template x-for="w in mvPlanResult?.warnings || []" :key="w.type">
        <div class="rounded p-2 flex gap-2"
             :class="w.type === 'sparse_vocals' ? 'bg-yellow-900/40 border border-yellow-700/40' : 'bg-red-900/40 border border-red-700/40'">
          <span>&#9888;</span>
          <div class="flex-1">
            <div class="font-medium" x-text="w.type.replaceAll('_', ' ')"></div>
            <div class="text-gray-300" x-text="w.message"></div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Step 1: World Building -->
  <div x-show="mvStep===1" class="space-y-3">

    <!-- Creative Brief editor (collapsible) -->
    <div class="bg-gray-900 rounded-lg border border-gray-800">
      <button @click="mvBriefOpen = !mvBriefOpen" class="w-full flex items-center justify-between p-3 text-left">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium">Creative brief</span>
          <span class="text-xs text-gray-500">narrative · mood · style · palette · camera</span>
          <span x-show="mvBriefSaving" class="text-xs text-green-400 animate-pulse">saving…</span>
        </div>
        <span x-text="mvBriefOpen ? '&#9650;' : '&#9660;'" class="text-gray-500"></span>
      </button>
      <div x-show="mvBriefOpen" class="p-3 pt-0 space-y-2 border-t border-gray-800">
        <textarea x-model="mvBrief.narrative" @blur="mvSaveBrief()" placeholder="Narrative — the story arc" rows="2" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <textarea x-model="mvBrief.mood" @blur="mvSaveBrief()" placeholder="Mood — emotional tone" rows="1" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <textarea x-model="mvBrief.visual_style" @blur="mvSaveBrief()" placeholder="Visual style — look, film stock, references" rows="2" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <textarea x-model="mvBrief.color_palette" @blur="mvSaveBrief()" placeholder="Color palette" rows="1" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <textarea x-model="mvBrief.camera_style" @blur="mvSaveBrief()" placeholder="Camera style" rows="1" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <textarea x-model="mvBrief.global_style" @blur="mvSaveBrief()" placeholder="Global style (applied to all generations)" rows="1" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <textarea x-model="mvBrief.notes" @blur="mvSaveBrief()" placeholder="Notes" rows="1" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-xs resize-none"></textarea>
        <p class="text-xs text-gray-500 italic">Auto-saves on blur.</p>
      </div>
    </div>

    <div class="bg-gray-800/50 rounded-lg p-3 border border-gray-700 text-xs text-gray-400 space-y-1">
      <p class="font-medium text-gray-300">Build your visual world</p>
      <p>These elements were auto-detected from the lyrics. Edit descriptions to match your vision, upload reference photos, or generate visual references. Scenes that have refs for their elements will be composed via Qwen-Image-Edit (multi-ref); scenes without refs fall back to z-turbo text-to-image.</p>
    </div>

    <div class="flex gap-2 mb-2">
      <button @click="mvGenAllElements()" :disabled="mvLoading" class="flex-1 bg-blue-600 hover:bg-blue-500 py-1.5 rounded-lg text-xs disabled:opacity-50">
        <span x-text="mvLoading ? 'Generating...' : 'Generate All References'"></span>
      </button>
    </div>

    <div class="grid gap-2">
      <template x-for="cat in ['who','where','when','what','why']" :key="cat">
        <div class="bg-gray-900 rounded-lg p-3 border border-gray-800" x-show="mvElements.some(e => e.category === cat) || mvAddingElement === cat">
          <div class="flex items-center justify-between mb-2">
            <div>
              <span class="text-xs font-bold uppercase" :class="{'text-blue-400': cat==='who', 'text-green-400': cat==='where', 'text-yellow-400': cat==='when', 'text-purple-400': cat==='what', 'text-pink-400': cat==='why'}" x-text="cat"></span>
              <span class="text-xs text-gray-600 ml-2" x-text="{'who':'Characters & subjects','where':'Locations & settings','when':'Time & atmosphere','what':'Objects & actions','why':'Mood & emotion'}[cat]"></span>
            </div>
            <button @click="mvAddingElement=cat" class="text-xs bg-gray-800 px-2 py-1 rounded hover:bg-gray-700">+ Add</button>
          </div>
          <template x-for="el in mvElements.filter(e => e.category === cat)" :key="el.id">
            <div class="py-2 border-t border-gray-800">
              <div class="flex items-center gap-2">
                <span class="text-sm font-medium" x-text="el.name"></span>
                <span class="text-xs text-gray-500" x-text="(el.source_images||0) + ' src, ' + (el.reference_images||0) + ' refs'"></span>
                <div class="ml-auto flex gap-1">
                  <label class="text-xs text-green-400 hover:text-green-300 cursor-pointer">
                    <input type="file" accept="image/*" multiple @change="mvUploadSourceImages(el.id, $event)" class="hidden">
                    Upload
                  </label>
                  <button @click="mvGenElement(el.id)" :disabled="mvGeneratingElement[el.id]"
                          class="text-xs text-blue-400 hover:text-blue-300 disabled:opacity-50 disabled:text-gray-500">
                    <span x-text="mvGeneratingElement[el.id] ? 'Generating…' : 'Generate'"></span>
                  </button>
                </div>
              </div>
              <!-- Editable description -->
              <textarea x-model="el.description" @change="mvUpdateElement(el.id, el.description)" rows="2"
                        class="w-full bg-gray-950 border border-gray-800 rounded p-1.5 text-xs text-gray-400 resize-none mt-1 focus:border-gray-600 focus:text-gray-200"></textarea>
              <!-- Reference image thumbnails — click opens ref gallery for approve/delete -->
              <div x-show="el.reference_paths?.length" class="flex gap-1 mt-2 overflow-x-auto">
                <template x-for="(ref, ri) in el.reference_paths || []" :key="ref">
                  <img :src="'/files/' + ref" class="h-16 w-16 rounded object-cover flex-shrink-0 cursor-pointer ring-1 ring-gray-800 hover:ring-blue-500" @click="mvOpenRefGallery(el, ri)">
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>

    <!-- Add Element Modal -->
    <div x-show="mvAddingElement" class="bg-gray-800 rounded-lg p-4 space-y-2 border border-gray-700">
      <input x-model="mvNewEl.id" placeholder="ID (slug)" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm">
      <input x-model="mvNewEl.name" placeholder="Name" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm">
      <textarea x-model="mvNewEl.description" placeholder="Visual description..." rows="2" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm resize-none"></textarea>
      <label class="block w-full border border-dashed border-gray-600 rounded p-3 text-center cursor-pointer hover:border-gray-400">
        <input type="file" accept="image/*" multiple @change="mvNewEl.files = $event.target.files" class="hidden">
        <span class="text-xs text-gray-400" x-text="mvNewEl.files?.length ? mvNewEl.files.length + ' image(s) selected' : 'Reference images (optional)'"></span>
      </label>
      <div class="flex gap-2">
        <button @click="mvSaveElement()" class="bg-blue-600 px-3 py-1.5 rounded text-sm">Save</button>
        <button @click="mvAddingElement=null" class="bg-gray-700 px-3 py-1.5 rounded text-sm">Cancel</button>
      </div>
    </div>

    <button @click="mvStep=2" class="w-full bg-gray-800 hover:bg-gray-700 py-2 rounded-lg text-sm">Next: Scenes →</button>
  </div>

  <!-- Step 2: Scene Prompts -->
  <div x-show="mvStep===2" class="space-y-3">
    <h2 class="font-medium">Scenes <span class="text-gray-500 text-sm" x-text="mvScenes?.length + ' clips · ' + mvSongDuration().toFixed(1) + 's'"></span></h2>

    <!-- Scene timeline — click a segment to jump to its card -->
    <div x-show="mvScenes?.length" class="bg-gray-900 rounded-lg border border-gray-800 p-2 space-y-1">
      <svg class="w-full h-10" viewBox="0 0 1000 40" preserveAspectRatio="none">
        <rect x="0" y="18" width="1000" height="4" fill="#1f2937" />
        <template x-for="scene in mvScenes || []" :key="scene.id">
          <g class="cursor-pointer" @click="mvScrollToScene(scene.id)">
            <rect :x="(scene.start / mvSongDuration()) * 1000"
                  :width="Math.max(1, ((scene.end - scene.start) / mvSongDuration()) * 1000 - 1)"
                  y="8" height="24"
                  :fill="mvSceneColor(scene)"
                  :opacity="mvRetrying[scene.id] ? 0.4 : 0.85">
              <title x-text="'Scene ' + scene.id + ' · ' + scene.start.toFixed(1) + '–' + scene.end.toFixed(1) + 's · ' + scene.segment_type"></title>
            </rect>
            <text :x="(scene.start / mvSongDuration()) * 1000 + 2" y="24"
                  class="text-[8px] fill-black font-bold pointer-events-none"
                  x-text="scene.id"></text>
          </g>
        </template>
      </svg>
      <div class="flex items-center justify-between text-[10px] text-gray-500 px-1">
        <div class="flex gap-3">
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded" style="background:#374151"></span>empty</span>
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded" style="background:#3b82f6"></span>prompt</span>
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded" style="background:#eab308"></span>image</span>
          <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded" style="background:#16a34a"></span>clip</span>
        </div>
        <span x-text="mvSongDuration().toFixed(1) + 's'"></span>
      </div>
    </div>

    <!-- Saved-prompts warning banner (from set_prompts) -->
    <template x-for="w in mvPromptsWarnings || []" :key="w.type">
      <div class="bg-yellow-900/40 border border-yellow-700/40 rounded p-2 text-xs flex gap-2">
        <span>&#9888;</span>
        <div class="flex-1">
          <div class="font-medium" x-text="w.type.replaceAll('_', ' ')"></div>
          <div class="text-gray-300" x-text="w.message"></div>
          <template x-if="w.conflicts">
            <div class="mt-1 text-gray-400">
              <template x-for="c in w.conflicts" :key="c.scene_id">
                <div x-text="'Scene ' + c.scene_id + ': ' + (c.forbidden_phrases_present || []).join(', ')"></div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <div class="space-y-2">
      <template x-for="scene in mvScenes || []" :key="scene.id">
        <div :id="'mv-scene-' + scene.id" class="bg-gray-900 rounded-lg p-3 border border-gray-800 scroll-mt-20">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <span class="text-xs bg-gray-800 px-2 py-0.5 rounded" x-text="scene.start.toFixed(1) + 's - ' + scene.end.toFixed(1) + 's'"></span>
            <span class="text-xs text-gray-500" x-text="scene.segment_type"></span>
            <span class="text-xs text-gray-600" x-text="(scene.end - scene.start).toFixed(1) + 's'"></span>
            <!-- Multi-ref badge: how many of this scene's element_refs have a reference image -->
            <template x-if="mvRefCountForScene(scene) > 0">
              <span class="text-xs bg-blue-900/60 border border-blue-700 text-blue-200 px-2 py-0.5 rounded-full" x-text="'&#10024; ' + mvRefCountForScene(scene) + '-ref qwen-edit'"></span>
            </template>
            <template x-if="(scene.element_refs||[]).length > 0 && mvRefCountForScene(scene) === 0">
              <span class="text-xs bg-yellow-900/60 border border-yellow-700 text-yellow-200 px-2 py-0.5 rounded-full" title="Elements referenced but none have generated references — identity will drift">&#9888; refs missing</span>
            </template>
            <template x-if="(scene.element_refs||[]).length === 0">
              <span class="text-xs bg-gray-800 border border-gray-700 text-gray-500 px-2 py-0.5 rounded-full">z-turbo txt2img</span>
            </template>
          </div>
          <p class="text-xs text-gray-400 mb-2 line-clamp-2" x-text="scene.text"></p>

          <!-- Scene thumbnail (shown once images exist) + per-scene regen -->
          <div x-show="scene.image_path" class="mb-2 flex items-start gap-2">
            <img :src="'/files/' + scene.image_path" class="h-24 rounded object-cover cursor-pointer" @click="viewFile({path: scene.image_path})">
            <button @click="mvRetryScene(scene.id)" :disabled="mvRetrying[scene.id]"
                    class="text-xs bg-gray-800 hover:bg-gray-700 px-2 py-1 rounded disabled:opacity-50">
              <span x-text="mvRetrying[scene.id] ? 'Regenerating…' : '&#8635; Regen'"></span>
            </button>
          </div>

          <!-- Element tags -->
          <div class="flex flex-wrap gap-1 mb-2">
            <template x-for="(ref, ri) in scene.element_refs || []" :key="ref.element_id">
              <span class="inline-flex items-center gap-1 text-xs bg-gray-800 border border-gray-700 px-2 py-0.5 rounded-full">
                <span x-text="ref.element_id"></span>
                <button @click="scene.element_refs.splice(ri, 1)" class="text-gray-500 hover:text-red-400">&times;</button>
              </span>
            </template>
            <!-- Add element dropdown -->
            <div class="relative inline-block" x-data="{open: false}">
              <button @click="open = !open" class="text-xs bg-gray-800 border border-dashed border-gray-600 px-2 py-0.5 rounded-full hover:border-gray-400">+ element</button>
              <div x-show="open" @click.away="open = false" class="absolute z-10 mt-1 left-0 bg-gray-800 border border-gray-700 rounded-lg shadow-lg p-1 max-h-48 overflow-y-auto w-48">
                <template x-for="el in mvElements.filter(e => !(scene.element_refs||[]).some(r => r.element_id === e.id))" :key="el.id">
                  <button @click="if(!scene.element_refs) scene.element_refs=[]; scene.element_refs.push({element_id: el.id, override_description: ''}); open=false"
                          class="block w-full text-left px-2 py-1 text-xs rounded hover:bg-gray-700">
                    <span class="text-gray-500 uppercase" x-text="el.category"></span>
                    <span x-text="el.name" class="ml-1"></span>
                  </button>
                </template>
                <button @click="mvAddingElement='what'; mvStep=1; open=false" class="block w-full text-left px-2 py-1 text-xs text-blue-400 rounded hover:bg-gray-700 border-t border-gray-700 mt-1 pt-1">+ New element...</button>
              </div>
            </div>
          </div>

          <textarea x-model="scene.prompt" placeholder="Visual prompt..." rows="2"
                    class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-xs resize-none mb-1"></textarea>
          <textarea x-model="scene.motion_prompt" placeholder="Motion/camera prompt..." rows="1"
                    class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-xs resize-none"></textarea>
        </div>
      </template>
    </div>
    <div class="flex gap-2">
      <button @click="mvSavePrompts()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm">Save Prompts</button>
      <button @click="mvStep=3" class="flex-1 bg-gray-800 hover:bg-gray-700 py-2 rounded-lg text-sm">Next: Generate →</button>
    </div>
  </div>

  <!-- Step 3: Generate -->
  <div x-show="mvStep===3" x-init="if(mvProject) mvPollStatus()" class="space-y-3">
    <h2 class="font-medium">Generate</h2>

    <!-- Progress -->
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800 space-y-2">
      <div class="flex justify-between text-sm">
        <span>Prompts</span>
        <span x-text="(mvGenStatus?.has_prompts||0) + '/' + (mvGenStatus?.total_scenes||mvScenes?.length||'?')"></span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-2">
        <div class="bg-purple-500 h-2 rounded-full transition-all" :style="'width:' + ((mvGenStatus?.has_prompts||0)/Math.max(mvGenStatus?.total_scenes||mvScenes?.length||1,1)*100) + '%'"></div>
      </div>
      <div class="flex justify-between text-sm">
        <span>Images</span>
        <span x-text="(mvGenStatus?.has_images||0) + '/' + (mvGenStatus?.total_scenes||mvScenes?.length||'?')"></span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-2">
        <div class="bg-blue-500 h-2 rounded-full transition-all" :style="'width:' + ((mvGenStatus?.has_images||0)/Math.max(mvGenStatus?.total_scenes||mvScenes?.length||1,1)*100) + '%'"></div>
      </div>
      <div class="flex justify-between text-sm">
        <span>Audio</span>
        <span x-text="(mvGenStatus?.has_audio||0) + '/' + (mvGenStatus?.total_scenes||mvScenes?.length||'?')"></span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-2">
        <div class="bg-yellow-500 h-2 rounded-full transition-all" :style="'width:' + ((mvGenStatus?.has_audio||0)/Math.max(mvGenStatus?.total_scenes||mvScenes?.length||1,1)*100) + '%'"></div>
      </div>
      <div class="flex justify-between text-sm">
        <span>Clips</span>
        <span x-text="(mvGenStatus?.has_clips||0) + '/' + (mvGenStatus?.total_scenes||mvScenes?.length||'?')"></span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-2">
        <div class="bg-green-500 h-2 rounded-full transition-all" :style="'width:' + ((mvGenStatus?.has_clips||0)/Math.max(mvGenStatus?.total_scenes||mvScenes?.length||1,1)*100) + '%'"></div>
      </div>
      <p x-show="mvGenStatus?.generating" class="text-xs text-yellow-400 animate-pulse">Generating...</p>
      <p x-show="mvGenStatus?.missing_clips?.length > 0 && !mvGenStatus?.generating" class="text-xs text-gray-500">
        Missing clips: <span x-text="mvGenStatus?.missing_clips?.join(', ')"></span>
      </p>
    </div>

    <!-- Warnings from the last generate run -->
    <template x-for="w in mvGenStatus?.last_warnings || []" :key="w.type + (w.message || '')">
      <div class="rounded p-2 text-xs flex gap-2"
           :class="w.type === 'element_drift' ? 'bg-yellow-900/40 border border-yellow-700/40' : 'bg-red-900/40 border border-red-700/40'">
        <span>&#9888;</span>
        <div class="flex-1">
          <div class="font-medium" x-text="w.type.replaceAll('_', ' ')"></div>
          <div class="text-gray-300" x-text="w.message"></div>
          <template x-if="w.elements">
            <div class="mt-1 text-gray-400">
              <template x-for="e in w.elements" :key="e.id">
                <div x-text="'• ' + (e.name || e.id) + ' (in ' + e.scene_count + ' scenes)'"></div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Failed scenes from last run, with retry -->
    <div x-show="(mvGenStatus?.last_failed || []).length > 0" class="bg-red-900/20 border border-red-800/60 rounded-lg p-3 space-y-2">
      <div class="text-xs font-medium text-red-300">Failed scenes from last run</div>
      <div class="space-y-1">
        <template x-for="f in mvGenStatus?.last_failed || []" :key="f.scene + '_' + f.step">
          <div class="flex items-center gap-2 text-xs">
            <span class="bg-red-900/60 px-2 py-0.5 rounded" x-text="'Scene ' + f.scene"></span>
            <span class="text-gray-400" x-text="f.step + (f.reason ? ' · ' + f.reason : '')"></span>
            <button @click="mvRetryScene(f.scene)" :disabled="mvRetrying[f.scene] || mvGenStatus?.generating"
                    class="ml-auto bg-gray-800 hover:bg-gray-700 px-2 py-0.5 rounded disabled:opacity-50">
              <span x-text="mvRetrying[f.scene] ? 'Retrying...' : 'Retry'"></span>
            </button>
          </div>
        </template>
      </div>
    </div>

    <div class="flex gap-2">
      <button @click="mvSavePrompts(); mvStartGenerate()" :disabled="mvGenStatus?.generating"
              class="flex-1 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm disabled:opacity-50">
        <span x-text="mvGenStatus?.generating ? 'Running...' : 'Generate All'"></span>
      </button>
      <button @click="mvStep=4" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm">Review →</button>
    </div>
  </div>

  <!-- Step 4: Review & Stitch -->
  <div x-show="mvStep===4" class="space-y-3">
    <h2 class="font-medium">Review</h2>
    <button @click="mvDoStitch()" :disabled="mvLoading"
            class="w-full bg-green-600 hover:bg-green-500 py-2 rounded-lg font-medium text-sm disabled:opacity-50">
      <span x-text="mvLoading ? 'Stitching...' : 'Stitch Final Video'"></span>
    </button>
    <div x-show="mvFinalVideo">
      <video :src="mvFinalVideo" controls class="w-full rounded-lg"></video>
      <a :href="mvFinalVideo" download class="inline-block mt-2 text-xs bg-gray-800 px-3 py-1.5 rounded-lg hover:bg-gray-700">Download</a>
    </div>
    <div x-show="mvGenStatus?.missing_clips?.length > 0" class="text-xs text-yellow-400">
      Missing clips: <span x-text="mvGenStatus?.missing_clips?.join(', ')"></span>
    </div>
  </div>

</div>
</template>

<!-- Reference Gallery Modal (Pack B) -->
<template x-if="mvRefGallery" x-cloak>
  <div class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" @click.self="mvRefGallery=null">
    <div class="bg-gray-900 rounded-lg border border-gray-700 max-w-3xl w-full p-4 space-y-3">
      <div class="flex items-center justify-between">
        <div class="text-sm">
          <span class="font-medium" x-text="mvRefGallery.name"></span>
          <span class="text-gray-500 ml-2" x-text="'(' + (mvRefGallery.index + 1) + '/' + mvRefGallery.paths.length + ')'"></span>
        </div>
        <button @click="mvRefGallery=null" class="text-gray-500 hover:text-gray-300 text-2xl leading-none">&times;</button>
      </div>
      <div class="relative">
        <img :src="'/files/' + mvRefGallery.paths[mvRefGallery.index]" class="w-full max-h-[70vh] object-contain rounded">
        <button x-show="mvRefGallery.index > 0" @click="mvRefGallery.index--" class="absolute left-2 top-1/2 -translate-y-1/2 bg-gray-900/80 hover:bg-gray-800 w-10 h-10 rounded-full">&#10094;</button>
        <button x-show="mvRefGallery.index < mvRefGallery.paths.length - 1" @click="mvRefGallery.index++" class="absolute right-2 top-1/2 -translate-y-1/2 bg-gray-900/80 hover:bg-gray-800 w-10 h-10 rounded-full">&#10095;</button>
      </div>
      <div class="flex items-center justify-between">
        <div class="flex gap-1 overflow-x-auto">
          <template x-for="(p, i) in mvRefGallery.paths" :key="p">
            <img :src="'/files/' + p" @click="mvRefGallery.index = i"
                 :class="i === mvRefGallery.index ? 'ring-2 ring-blue-500' : 'ring-1 ring-gray-800 opacity-60'"
                 class="h-14 w-14 rounded object-cover flex-shrink-0 cursor-pointer">
          </template>
        </div>
        <div class="flex gap-2">
          <a :href="'/files/' + mvRefGallery.paths[mvRefGallery.index]" download class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded">Download</a>
          <button @click="mvRemoveReference()" class="text-xs bg-red-900/60 hover:bg-red-900 text-red-200 px-3 py-1.5 rounded">Delete</button>
        </div>
      </div>
    </div>
  </div>
</template>

</main>

<script>
function app() {
  return {
    ready: false,
    setupError: 'loading',
    mode: 'studio',
    // Studio
    presets: {},
    aspectRatios: [
      { label: '1:1',   w: 1024, h: 1024 },
      { label: '16:9',  w: 1280, h: 720 },
      { label: '9:16',  w: 720,  h: 1280 },
      { label: '4:3',   w: 1024, h: 768 },
      { label: '3:4',   w: 768,  h: 1024 },
      { label: '21:9',  w: 1344, h: 576 },
      { label: '3:2',   w: 1152, h: 768 },
      { label: '2:3',   w: 768,  h: 1152 },
    ],
    aspectRatio: { label: '1:1', w: 1024, h: 1024 },
    selectedPreset: null,
    prompt: '',
    seed: '',
    promptGuide: '',
    uploadedFile: null,
    generating: false,
    status: '',
    result: null,
    gallery: [],
    // Music Video
    mvStep: 0,
    mvProject: '',
    mvTitle: '',
    mvAudioFile: null,
    mvAspectRatio: { label: '16:9', w: 1280, h: 720 },
    mvScenes: [],
    mvElements: [],
    mvAddingElement: null,
    mvNewEl: { id: '', name: '', description: '' },
    mvGenStatus: null,
    mvFinalVideo: null,
    mvLoading: false,
    mvPollTimer: null,
    // Pack A/B/D additions: warnings, beat info, brief, project browser, ref gallery
    mvPlanResult: null,        // plan response (warnings[], beat_info, duration)
    mvPromptsWarnings: [],     // last set_prompts warnings
    mvProjects: [],            // [{name, title, duration, scene_count, clip_count, has_final}]
    mvBrief: {
      narrative: '', mood: '', visual_style: '',
      color_palette: '', camera_style: '', global_style: '', notes: ''
    },
    mvBriefOpen: false,
    mvRefGallery: null,        // { elementId, paths: [], index }
    mvRetrying: {},            // {sceneId: true} while a retry is in flight
    mvGeneratingElement: {},   // {elementId: true} while element ref gen in flight
    mvBriefSaving: false,      // brief auto-save indicator

    async init() {
      try {
        const health = await fetch('/api/health').then(r => r.json());
        if (!health.ok) {
          this.setupError = 'no_key';
          return;
        }
        this.ready = true;
        await this.loadPresets();
        await this.loadGallery();
        await this.mvLoadProjects();
      } catch (e) {
        this.setupError = 'no_key';
      }
    },

    async loadPresets() {
      this.presets = await fetch('/api/presets').then(r => r.json());
      if (!this.selectedPreset) {
        const names = Object.keys(this.presets);
        if (names.length) this.selectedPreset = names[0];
      }
    },

    async loadGallery() {
      const data = await fetch('/api/outputs?limit=20').then(r => r.json());
      this.gallery = data.files || [];
    },

    handleImageUpload(e) {
      this.uploadedFile = e.target.files[0];
    },

    viewFile(f) {
      this.result = { file: f.path };
    },

    async generate() {
      this.generating = true;
      this.status = 'Submitting...';
      this.result = null;
      try {
        const body = { preset: this.selectedPreset, prompt: this.prompt || undefined };
        if (this.seed) body.seed = parseInt(this.seed);
        // Pass aspect ratio as overrides
        body.overrides = [`57:13.width=${this.aspectRatio.w}`, `57:13.height=${this.aspectRatio.h}`];

        const p = this.presets[this.selectedPreset];
        if (p?.has_image_input && this.uploadedFile) {
          // Upload image first, then animate
          const fd = new FormData();
          fd.append('file', this.uploadedFile);
          const up = await fetch('/api/upload', { method: 'POST', body: fd }).then(r => r.json());
          // Use animate endpoint
          const res = await fetch('/api/animate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image_path: up.output || '', preset: this.selectedPreset, prompt: this.prompt, seed: body.seed })
          }).then(r => r.json());
          this.result = res;
        } else {
          // Text to image
          this.status = 'Generating...';
          const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          }).then(r => r.json());
          this.result = res;
        }
      } catch (e) {
        this.status = 'Error: ' + e.message;
      }
      this.generating = false;
      this.status = '';
      this.loadGallery();
    },

    // ── Music Video ──
    async mvPlan() {
      this.mvLoading = true;
      this.mvPlanResult = null;
      const fd = new FormData();
      fd.append('file', this.mvAudioFile);
      fd.append('title', this.mvTitle || this.mvProject);
      fd.append('width', this.mvAspectRatio.w);
      fd.append('height', this.mvAspectRatio.h);
      const res = await fetch(`/api/mv/${this.mvProject}/plan`, { method: 'POST', body: fd }).then(r => r.json());
      this.mvScenes = res.scenes || [];
      this.mvPlanResult = {
        duration: res.duration,
        scene_count: res.scene_count,
        warnings: res.warnings || [],
        beat_info: res.beat_info || null,
      };
      this.mvLoading = false;
      this.mvStep = 1;
      await this.mvLoadElements();
      await this.mvLoadProjects();
    },

    async mvLoadElements() {
      const res = await fetch(`/api/mv/${this.mvProject}/elements`).then(r => r.json());
      this.mvElements = Object.entries(res).map(([id, v]) => ({ id, ...v }));
    },

    async mvSaveElement() {
      const fd = new FormData();
      fd.append('element_id', this.mvNewEl.id);
      fd.append('name', this.mvNewEl.name);
      fd.append('description', this.mvNewEl.description);
      fd.append('category', this.mvAddingElement);
      if (this.mvNewEl.files) {
        for (const f of this.mvNewEl.files) fd.append('files', f);
      }
      await fetch(`/api/mv/${this.mvProject}/elements`, { method: 'POST', body: fd });
      this.mvNewEl = { id: '', name: '', description: '' };
      this.mvAddingElement = null;
      this.mvLoadElements();
    },

    async mvUploadSourceImages(elementId, event) {
      const fd = new FormData();
      for (const f of event.target.files) fd.append('files', f);
      await fetch(`/api/mv/${this.mvProject}/elements/${elementId}/upload`, { method: 'POST', body: fd });
      this.mvLoadElements();
    },

    async mvGenElement(id) {
      this.mvGeneratingElement[id] = true;
      try {
        await fetch(`/api/mv/${this.mvProject}/elements/${id}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        await this.mvLoadElements();
      } finally {
        this.mvGeneratingElement[id] = false;
      }
    },

    async mvGenAllElements() {
      this.mvLoading = true;
      for (const el of this.mvElements) {
        if ((el.reference_images || 0) === 0) {
          this.mvGeneratingElement[el.id] = true;
          try {
            await fetch(`/api/mv/${this.mvProject}/elements/${el.id}/generate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({})
            });
          } finally {
            this.mvGeneratingElement[el.id] = false;
          }
        }
      }
      await this.mvLoadElements();
      this.mvLoading = false;
    },

    async mvUpdateElement(id, description) {
      await fetch(`/api/mv/${this.mvProject}/elements/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description })
      });
    },

    async mvSavePrompts() {
      const res = await fetch(`/api/mv/${this.mvProject}/prompts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scene_prompts: this.mvScenes.map(s => ({
          id: s.id,
          prompt: s.prompt,
          motion_prompt: s.motion_prompt,
          element_refs: s.element_refs || [],
        })) })
      }).then(r => r.json());
      this.mvPromptsWarnings = res.warnings || [];
    },

    async mvStartGenerate() {
      await fetch(`/api/mv/${this.mvProject}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      this.mvPollStatus();
    },

    mvPollStatus() {
      if (this.mvPollTimer) clearInterval(this.mvPollTimer);
      const tick = async () => {
        this.mvGenStatus = await fetch(`/api/mv/${this.mvProject}/status`).then(r => r.json());
        // Merge per-scene image_path into mvScenes without clobbering user's in-progress edits.
        const assets = this.mvGenStatus.scene_assets || {};
        for (const s of this.mvScenes) {
          const a = assets[s.id];
          if (a && a.image_path && !s.image_path) s.image_path = a.image_path;
          if (a && a.video_path && !s.video_path) s.video_path = a.video_path;
        }
        if (!this.mvGenStatus.generating) clearInterval(this.mvPollTimer);
      };
      this.mvPollTimer = setInterval(tick, 5000);
      tick(); // immediate first poll
    },

    async mvDoStitch() {
      this.mvLoading = true;
      const res = await fetch(`/api/mv/${this.mvProject}/stitch`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      }).then(r => r.json());
      if (res.output) this.mvFinalVideo = '/files/' + res.output;
      this.mvLoading = false;
    },

    // ── Pack A/B/D helpers ──

    async mvLoadProjects() {
      try {
        const res = await fetch('/api/mv/projects').then(r => r.json());
        this.mvProjects = res.projects || [];
      } catch (e) { /* non-fatal */ }
    },

    async mvLoadProject(name) {
      if (!name) return;
      this.mvLoading = true;
      try {
        const r = await fetch(`/api/mv/${name}/load`).then(r => r.json());
        if (r.error) { this.mvLoading = false; return; }
        this.mvProject = name;
        this.mvTitle = r.title || name;
        this.mvScenes = r.scenes || [];
        this.mvElements = (r.elements || []).map(el => ({
          ...el,
          source_images: (el.source_images || []).length,
          reference_images: (el.reference_images || []).length,
          reference_paths: el.reference_images || [],
        }));
        this.mvBrief = {
          narrative: r.brief?.narrative || '',
          mood: r.brief?.mood || '',
          visual_style: r.brief?.visual_style || '',
          color_palette: r.brief?.color_palette || '',
          camera_style: r.camera_style || '',
          global_style: r.global_style || '',
          notes: r.brief?.notes || '',
        };
        // Match aspect ratio to stored width/height
        const match = this.aspectRatios.find(a => a.w === r.width && a.h === r.height);
        if (match) this.mvAspectRatio = match;
        if (r.final_video) this.mvFinalVideo = '/files/' + r.final_video;
        this.mvStep = this.mvScenes.length ? 1 : 0;
        this.mvPollStatus();
      } catch (e) { /* non-fatal */ }
      this.mvLoading = false;
    },

    async mvSaveBrief() {
      if (!this.mvProject) return;
      this.mvBriefSaving = true;
      try {
        await fetch(`/api/mv/${this.mvProject}/brief`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            narrative: this.mvBrief.narrative,
            mood: this.mvBrief.mood,
            visual_style: this.mvBrief.visual_style,
            color_palette: this.mvBrief.color_palette,
            camera_style: this.mvBrief.camera_style,
            global_style: this.mvBrief.global_style,
            notes: this.mvBrief.notes,
          })
        });
      } finally {
        // Keep the "saved" pulse visible for a beat before clearing.
        setTimeout(() => { this.mvBriefSaving = false; }, 600);
      }
    },

    mvRefCountForScene(scene) {
      // How many of this scene's element_refs have a reference_image on disk
      // (drives the 'uses multi-ref' badge vs. 'will drift via z-turbo' warning).
      const refs = scene.element_refs || [];
      let count = 0;
      for (const r of refs) {
        const eid = r.element_id || r;
        const el = this.mvElements.find(e => e.id === eid);
        if (el && (el.reference_images > 0 || (el.reference_paths || []).length > 0)) count++;
      }
      return count;
    },

    mvOpenRefGallery(el, startIndex = 0) {
      this.mvRefGallery = {
        elementId: el.id,
        name: el.name,
        paths: (el.reference_paths || []).slice(),
        index: startIndex,
      };
    },

    async mvRemoveReference() {
      if (!this.mvRefGallery) return;
      const g = this.mvRefGallery;
      const path = g.paths[g.index];
      if (!path) return;
      await fetch(`/api/mv/${this.mvProject}/elements/${g.elementId}/references`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path }),
      });
      g.paths.splice(g.index, 1);
      if (g.index >= g.paths.length) g.index = Math.max(0, g.paths.length - 1);
      if (g.paths.length === 0) this.mvRefGallery = null;
      this.mvLoadElements();
    },

    async mvRetryScene(sceneId) {
      // Clear local thumbnails so the poller picks up the new ones.
      const scene = this.mvScenes.find(s => s.id === sceneId);
      if (scene) { scene.image_path = ''; scene.video_path = ''; }
      this.mvRetrying[sceneId] = true;
      await fetch(`/api/mv/${this.mvProject}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scenes: [sceneId] })
      });
      this.mvPollStatus();
      setTimeout(() => { this.mvRetrying[sceneId] = false; }, 2000);
    },

    mvDismissPlanResult() { this.mvPlanResult = null; },

    mvSongDuration() {
      if (this.mvPlanResult?.duration) return this.mvPlanResult.duration;
      if (this.mvScenes?.length) return Math.max(...this.mvScenes.map(s => s.end || 0));
      return 1;
    },

    mvSceneColor(scene) {
      // Matches the readiness cascade: clip > image > prompt > empty.
      if (scene.video_path) return '#16a34a';
      if (scene.image_path) return '#eab308';
      if (scene.prompt) return '#3b82f6';
      return '#374151';
    },

    mvScrollToScene(id) {
      const el = document.getElementById('mv-scene-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    },
  };
}
</script>
